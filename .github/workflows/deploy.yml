name: Deploy to VPS

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to VPS via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: 22
          script: |
            set -e
            cd /var/www/protels

            echo "=== Pulling latest code ==="
            git pull origin main

            echo "=== Installing dependencies ==="
            npm ci --prefer-offline

            echo "=== Building application ==="
            npm run build

            echo "=== Restarting PM2 ==="
            pm2 restart protels
            pm2 save

            echo "=== Verifying ==="
            sleep 3
            pm2 list | grep protels
            echo "Deployment complete!"

      - name: Verify site is up
        run: |
          sleep 5
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" https://protels.com/)
          echo "HTTP Status: $STATUS"
          if [ "$STATUS" != "200" ]; then
            echo "ERROR: Site returned $STATUS after deployment"
            exit 1
          fi
          echo "Site is live!"
