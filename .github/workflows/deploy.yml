name: Deploy to VPS

  on:
    push:
      branches:
        - main
    workflow_dispatch:

  jobs:
    deploy:
      runs-on: ubuntu-latest

      steps:
        - name: Deploy to VPS via SSH
          uses: appleboy/ssh-action@v1.0.3
          with:
            host: ${{ secrets.VPS_HOST }}
            username: ${{ secrets.VPS_USER }}
            key: ${{ secrets.VPS_SSH_KEY }}
            port: 22
            script: |
              set -e
              cd /var/www/protels

              echo "=== Ensuring SSH config for deploy key ==="
              mkdir -p /root/.ssh
              cat > /root/.ssh/config << 'SSHEOF'
              Host github.com
                HostName github.com
                User git
                IdentityFile /root/.ssh/github_deploy
                StrictHostKeyChecking no
              SSHEOF
              chmod 600 /root/.ssh/config

              echo "=== Setting up git remote ==="
              git remote remove origin 2>/dev/null || true
              git remote remove origingit 2>/dev/null || true
              git remote add origin git@github.com:fadyezzat10/protels-resort-hub.git

              echo "=== Fetching latest code ==="
              git fetch origin main

              echo "=== Syncing to latest ==="
              git checkout main 2>/dev/null || git checkout -b main origin/main
              git merge --ff-only origin/main 2>/dev/null || (git reset --hard origin/main && echo "Reset done")

              echo "=== Installing dependencies ==="
              npm ci --prefer-offline

              echo "=== Building application ==="
              npm run build

              echo "=== Restarting PM2 ==="
              pm2 restart protels
              pm2 save

              echo "=== Verifying ==="
              sleep 3
              pm2 list | grep protels
              echo "Deployment complete!"

        - name: Verify site is up
          run: |
            sleep 10
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" https://protels.com/)
            echo "HTTP Status: $STATUS"
            if [ "$STATUS" != "200" ]; then
              echo "WARNING: Site returned $STATUS"
            else
              echo "Site is live!"
            fi
  